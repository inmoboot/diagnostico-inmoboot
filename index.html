<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diagnóstico Inmoboot</title>

<style>

:root{
--primary:#0F2B46;
--secondary:#1F4E79;
--accent:#F4B400;
--light:#F7F9FC;
--dark:#0A1A2B;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--light);
color:var(--dark);
line-height:1.6;
}

section{
padding:80px 20px;
}

.container{
max-width:1100px;
margin:0 auto;
}

.hero{
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;
text-align:center;
padding:120px 20px;
}

.cta-button{
display:inline-block;
margin-top:30px;
padding:16px 40px;
background:var(--accent);
color:black;
font-weight:600;
text-decoration:none;
border-radius:6px;
}

.form-box{
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
margin-top:30px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:var(--accent);
border:none;
font-size:16px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<section class="hero">

<h1>¿Cuánto dinero está perdiendo tu inmobiliaria por no tener un sistema de seguimiento?</h1>

<p>Descúbrelo en menos de 60 segundos con este diagnóstico gratuito.</p>

<a href="#formulario" class="cta-button">Calcular ahora 🚀</a>

</section>


<section id="formulario">

<div class="container">

<h2>Diagnóstico gratuito</h2>

<div class="form-box">

<form id="diagnosticoForm">

<!-- FASE 1 -->

<div id="fase1">

<h3>Datos básicos</h3>

<input type="text" name="nombre" placeholder="Nombre" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="inmobiliaria" placeholder="Nombre de la inmobiliaria" required>

<button type="button" id="siguiente1">Siguiente ➡️</button>

</div>


<!-- FASE 2 -->

<div id="fase2" style="display:none;">

<h3>Datos de negocio</h3>

<input type="number" name="leads_mensuales" placeholder="Leads al mes" required>

<input type="number" name="seguimientos_por_lead" placeholder="Seguimientos por lead" required>

<input type="number" name="minutos_por_seguimiento" placeholder="Minutos por seguimiento" required>

<input type="number" name="ventas_mensuales" placeholder="Ventas al mes" required>

<input type="number" name="comision_media" placeholder="Comisión media (€)" required>

<input type="text" name="website" style="display:none">

<button type="submit">Recibir diagnóstico 📊</button>

</div>

</form>

</div>

</div>

</section>


<script>

// BOTÓN SIGUIENTE

document.getElementById("siguiente1").addEventListener("click", function(){

const nombre = document.querySelector('input[name="nombre"]').value;
const email = document.querySelector('input[name="email"]').value;
const inmobiliaria = document.querySelector('input[name="inmobiliaria"]').value;

if(nombre && email && inmobiliaria){

document.getElementById("fase1").style.display="none";
document.getElementById("fase2").style.display="block";

}else{

alert("Por favor completa todos los campos");

}

});


// ENVÍO DEL FORMULARIO

document.getElementById("diagnosticoForm").addEventListener("submit", function(e){

e.preventDefault();

const formData = new FormData(this);

fetch("https://script.google.com/macros/s/AKfycbzKg6YywkxSsbPJBLyUWxosOTX9JemOEEIKAcIzpReoXbfApvVVga4jt4_bTJMcmg9QWQ/exec",{

method:"POST",

body:formData

})

.then(res => res.text())

.then(data => {

window.location.href="gracias.html";

})

.catch(err => {

alert("Error enviando el formulario");

console.error(err);

});

});

</script>

</body>

</html>
